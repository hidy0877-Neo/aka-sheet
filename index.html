<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>赤シート暗記アプリ</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #1c1c1e;
    color: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 12px 16px;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    background: #2c2c2e;
    border-bottom: 1px solid #3a3a3c;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    gap: 12px;
  }
  #stage {
    position: relative;
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: center;
  }
  video, canvas {
    width: 100%;
    max-width: 600px;
    border-radius: 12px;
    background: #000;
    display: block;
  }
  canvas { touch-action: none; }  /* 独自のピンチ/パンのため既定ジェスチャは無効化 */

  .controls {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .row { display: flex; gap: 10px; }
  button {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: #0a84ff;
    color: #fff;
  }
  button:active { opacity: .75; }
  button.secondary { background: #3a3a3c; }
  button.active { background: #30d158; color: #000; }
  button.shutter { background: #fff; color: #000; font-size: 17px; }

  .slider-box {
    background: #2c2c2e;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .slider-box label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: #aeaeb2; margin-bottom: 8px;
  }
  input[type=range] { width: 100%; }

  .hidden { display: none !important; }
  #msg {
    font-size: 13px; color: #aeaeb2; text-align: center;
    padding: 0 16px; line-height: 1.6;
  }
  .hint { font-size: 12px; color: #8e8e93; text-align: center; }
</style>
</head>
<body>
<header>赤シート暗記アプリ</header>

<main>
  <div id="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas" class="hidden"></canvas>
  </div>

  <div id="msg" class="hidden"></div>

  <!-- 撮影前 -->
  <div class="controls" id="cameraControls">
    <button id="startBtn">カメラを起動</button>
    <button id="shutterBtn" class="shutter hidden">● 撮影</button>
    <button id="fileBtn" class="secondary">保存した写真から選ぶ</button>
    <input id="fileInput" type="file" accept="image/*" class="hidden">
    <p class="hint">背面カメラで撮るか、保存済みの写真を選んでください</p>
  </div>

  <!-- 撮影後 -->
  <div class="controls hidden" id="resultControls">
    <div class="slider-box">
      <label><span>タップで拾う感度</span><span id="sensVal"></span></label>
      <input type="range" id="sensitivity" min="8" max="55" value="22">
      <p class="hint">マーカーを拾いにくい→左へ / 広がりすぎる→右へ</p>
    </div>
    <div class="row">
      <button id="colRed" class="secondary">赤</button>
      <button id="colBlue" class="secondary">青</button>
      <button id="colBoth" class="secondary active">両方</button>
    </div>
    <div class="row">
      <button id="undoBtn" class="secondary">ひとつ戻す</button>
      <button id="clearBtn" class="secondary">全部消す</button>
    </div>
    <div class="row">
      <button id="resetBtn" class="secondary">全部隠す</button>
      <button id="retakeBtn" class="secondary">撮り直し</button>
    </div>
    <p class="hint" id="resultHint">マーカーをタップで隠す ／ 隠れた所をタップで確認 ／ 2本指ズーム・ダブルタップで等倍</p>
  </div>
</main>

<script>
(() => {
  "use strict";

  const video   = document.getElementById("video");
  const canvas  = document.getElementById("canvas");
  const ctx     = canvas.getContext("2d");
  const msg     = document.getElementById("msg");

  const cameraControls = document.getElementById("cameraControls");
  const resultControls = document.getElementById("resultControls");
  const startBtn    = document.getElementById("startBtn");
  const shutterBtn  = document.getElementById("shutterBtn");
  const fileBtn     = document.getElementById("fileBtn");
  const fileInput   = document.getElementById("fileInput");
  const resetBtn    = document.getElementById("resetBtn");
  const retakeBtn   = document.getElementById("retakeBtn");
  const undoBtn     = document.getElementById("undoBtn");
  const clearBtn    = document.getElementById("clearBtn");
  const colRed      = document.getElementById("colRed");
  const colBlue     = document.getElementById("colBlue");
  const colBoth     = document.getElementById("colBoth");
  const sensitivity = document.getElementById("sensitivity");
  const sensVal     = document.getElementById("sensVal");

  let stream = null;
  let baseCanvas = null;       // 撮影画像
  let baseImageData = null;    // 検出用画素
  let markerMask = null;       // マーカー画素マスク（全画面ぶん）
  let mw = 0, mh = 0;          // マスクの幅・高さ
  let boxes = [];              // タップで隠したブロック [{x,y,w,h,revealed}]
  let colorMode = "both";      // "both" | "red" | "blue"
  const view = { scale: 1, tx: 0, ty: 0 };
  const MAX_DIM = 1100;
  const DILATE_R = 2;          // マスクの膨張量
  const TAP_SEARCH = 16;       // タップ位置の近くでマーカーを探す半径(px)
  const MAX_ZOOM = 6;

  const pointers = new Map();
  let panLast = null, pinchStartDist = 0, pinchStartScale = 1, pinchAnchor = null;
  let moved = false, lastTap = 0;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  function showMsg(text){ msg.textContent = text; msg.classList.remove("hidden"); }
  function hideMsg(){ msg.classList.add("hidden"); }

  // ---- カメラ起動 ----
  async function startCamera() {
    hideMsg();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showMsg("このブラウザではカメラを使えません。\nLINE・Instagram・X などアプリ内のブラウザで開いている場合は、メニューから「Safari / Chrome で開く」を選んで開き直してください。");
      startBtn.classList.remove("hidden");
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } }, audio: false
      });
      video.srcObject = stream;
      await video.play();
      startBtn.classList.add("hidden");
      shutterBtn.classList.remove("hidden");
    } catch (e) {
      let m;
      if (e.name === "NotAllowedError" || e.name === "SecurityError") {
        m = "カメラの使用が許可されませんでした。\nアドレスバーのカメラ／鍵アイコン、またはブラウザの設定でこのサイトのカメラを「許可」にしてから、もう一度「カメラを起動」を押してください。";
      } else if (e.name === "NotFoundError" || e.name === "OverconstrainedError") {
        m = "使えるカメラが見つかりませんでした。別のブラウザ（Safari / Chrome）で試してください。（" + e.name + "）";
      } else if (e.name === "NotReadableError") {
        m = "カメラが他のアプリで使用中の可能性があります。他のカメラアプリを閉じて、もう一度お試しください。";
      } else {
        m = "カメラを起動できませんでした（" + e.name + "）。\nSafari / Chrome で、URL https://hidy0877-neo.github.io/aka-sheet/ を直接開いているか確認してください。";
      }
      showMsg(m);
      startBtn.classList.remove("hidden");
    }
  }

  // ---- 画像ソースを取り込み結果画面へ ----
  function setupFromSource(src, sw, sh) {
    if (!sw || !sh) { showMsg("画像を読み込めませんでした。別の写真でお試しください。"); return; }
    const s = Math.min(1, MAX_DIM / Math.max(sw, sh));
    const w = Math.round(sw * s), h = Math.round(sh * s);

    baseCanvas = document.createElement("canvas");
    baseCanvas.width = w; baseCanvas.height = h;
    const bctx = baseCanvas.getContext("2d", { willReadFrequently: true });
    bctx.drawImage(src, 0, 0, w, h);
    baseImageData = bctx.getImageData(0, 0, w, h);

    canvas.width = w; canvas.height = h;
    view.scale = 1; view.tx = 0; view.ty = 0;
    boxes = [];

    stopCamera();
    hideMsg();
    video.classList.add("hidden");
    canvas.classList.remove("hidden");
    startBtn.classList.add("hidden");
    shutterBtn.classList.add("hidden");
    cameraControls.classList.add("hidden");
    resultControls.classList.remove("hidden");

    computeMask();
  }

  function capture() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) { showMsg("まだ映像が準備できていません。少し待ってからもう一度。"); return; }
    setupFromSource(video, vw, vh);
  }

  async function loadFile(file) {
    if (!file) return;
    hideMsg();
    try {
      let src, sw, sh;
      if (window.createImageBitmap) {
        const bmp = await createImageBitmap(file, { imageOrientation: "from-image" });
        src = bmp; sw = bmp.width; sh = bmp.height;
      } else {
        const img = await new Promise((res, rej) => {
          const im = new Image();
          im.onload = () => res(im); im.onerror = rej;
          im.src = URL.createObjectURL(file);
        });
        src = img; sw = img.naturalWidth; sh = img.naturalHeight;
      }
      setupFromSource(src, sw, sh);
    } catch (e) {
      showMsg("この画像は読み込めませんでした（" + (e && e.name ? e.name : "エラー") + "）。別の写真でお試しください。");
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  // ---- マーカー画素の判定（HSV）----
  function isTarget(r, g, b, satMin) {
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const v = max / 255;
    if (v < 0.18) return false;
    const delta = max - min;
    if (delta === 0) return false;
    const sat = delta / max;
    let h;
    if (max === r)      h = 60 * (((g - b) / delta) % 6);
    else if (max === g) h = 60 * ((b - r) / delta + 2);
    else                h = 60 * ((r - g) / delta + 4);
    if (h < 0) h += 360;

    const isRed  = (h <= 45 || h >= 335);          // 赤〜オレンジ
    const isBlue = (h >= 178 && h <= 260);         // 青〜水色
    const blueSat = satMin * 0.6;                  // 水色は淡いので緩める

    if (colorMode === "red")  return isRed && sat >= satMin;
    if (colorMode === "blue") return isBlue && sat >= blueSat;
    if (isRed && sat >= satMin) return true;
    if (isBlue && sat >= blueSat) return true;
    return false;
  }

  // ---- マスク膨張（分断をつなぎフチを覆う）----
  function dilate(src, w, h, r) {
    if (r <= 0) return src;
    const tmp = new Uint8Array(w * h);
    for (let y = 0; y < h; y++) {
      const row = y * w;
      for (let x = 0; x < w; x++) {
        let on = 0;
        const x0 = Math.max(0, x - r), x1 = Math.min(w - 1, x + r);
        for (let xx = x0; xx <= x1; xx++) { if (src[row + xx]) { on = 1; break; } }
        tmp[row + x] = on;
      }
    }
    const out = new Uint8Array(w * h);
    for (let x = 0; x < w; x++) {
      for (let y = 0; y < h; y++) {
        let on = 0;
        const y0 = Math.max(0, y - r), y1 = Math.min(h - 1, y + r);
        for (let yy = y0; yy <= y1; yy++) { if (tmp[yy * w + x]) { on = 1; break; } }
        out[y * w + x] = on;
      }
    }
    return out;
  }

  // ---- マーカーマスクを計算（タップ判定の素材。ブロックは作らない）----
  function computeMask() {
    if (!baseImageData) return;
    const t = Number(sensitivity.value);
    sensVal.textContent = t;
    const satMin = t / 100;
    const { width: w, height: h, data } = baseImageData;
    let m = new Uint8Array(w * h);
    for (let i = 0, p = 0; i < data.length; i += 4, p++) {
      if (isTarget(data[i], data[i + 1], data[i + 2], satMin)) m[p] = 1;
    }
    markerMask = dilate(m, w, h, DILATE_R);
    mw = w; mh = h;
    render();
  }

  // ---- タップ地点のマーカーを塗りつぶし的に拾い、その外接矩形を返す ----
  function floodFillAt(sx, sy) {
    if (!markerMask) return null;
    const w = mw, h = mh;
    sx = Math.round(sx); sy = Math.round(sy);
    let seed = -1;
    if (sx >= 0 && sy >= 0 && sx < w && sy < h && markerMask[sy * w + sx]) {
      seed = sy * w + sx;
    } else {
      // タップが少しずれても拾えるよう近傍を探索
      let bestD = Infinity;
      for (let dy = -TAP_SEARCH; dy <= TAP_SEARCH; dy++) {
        const yy = sy + dy; if (yy < 0 || yy >= h) continue;
        for (let dx = -TAP_SEARCH; dx <= TAP_SEARCH; dx++) {
          const xx = sx + dx; if (xx < 0 || xx >= w) continue;
          if (markerMask[yy * w + xx]) { const d = dx * dx + dy * dy; if (d < bestD) { bestD = d; seed = yy * w + xx; } }
        }
      }
    }
    if (seed < 0) return null;

    const visited = new Uint8Array(w * h);
    const stack = new Int32Array(w * h);
    let sp = 0; stack[sp++] = seed; visited[seed] = 1;
    let minX = w, minY = h, maxX = 0, maxY = 0;
    while (sp > 0) {
      const cur = stack[--sp];
      const cx = cur % w, cy = (cur - cx) / w;
      if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
      if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
      if (cx > 0     && markerMask[cur - 1] && !visited[cur - 1]) { visited[cur - 1] = 1; stack[sp++] = cur - 1; }
      if (cx < w - 1 && markerMask[cur + 1] && !visited[cur + 1]) { visited[cur + 1] = 1; stack[sp++] = cur + 1; }
      if (cy > 0     && markerMask[cur - w] && !visited[cur - w]) { visited[cur - w] = 1; stack[sp++] = cur - w; }
      if (cy < h - 1 && markerMask[cur + w] && !visited[cur + w]) { visited[cur + w] = 1; stack[sp++] = cur + w; }
    }
    const pad = 2;
    return {
      x: Math.max(0, minX - pad), y: Math.max(0, minY - pad),
      w: Math.min(w, maxX + pad) - Math.max(0, minX - pad),
      h: Math.min(h, maxY + pad) - Math.max(0, minY - pad)
    };
  }

  // ---- 描画 ----
  function render() {
    if (!baseCanvas) return;
    const w = canvas.width, h = canvas.height;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
    ctx.setTransform(view.scale, 0, 0, view.scale, view.tx, view.ty);
    ctx.drawImage(baseCanvas, 0, 0);
    ctx.fillStyle = "#2b2b2e";
    for (const b of boxes) { if (!b.revealed) ctx.fillRect(b.x, b.y, b.w, b.h); }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // ---- 座標変換 ----
  function clientToCanvas(cx, cy) {
    const r = canvas.getBoundingClientRect();
    return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
  }
  function toImg(cx, cy) {
    const c = clientToCanvas(cx, cy);
    return { x: (c.x - view.tx) / view.scale, y: (c.y - view.ty) / view.scale };
  }
  function clampPan() {
    const w = canvas.width, h = canvas.height;
    view.tx = clamp(view.tx, w - w * view.scale, 0);
    view.ty = clamp(view.ty, h - h * view.scale, 0);
  }
  function resetZoom() { view.scale = 1; view.tx = 0; view.ty = 0; render(); }

  // ---- ポインタ操作 ----
  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    moved = false;
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      pinchStartDist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      pinchStartScale = view.scale;
      pinchAnchor = toImg((a.x + b.x) / 2, (a.y + b.y) / 2);
    } else if (pointers.size === 1) {
      panLast = { x: e.clientX, y: e.clientY };
    }
  });

  canvas.addEventListener("pointermove", (e) => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (pointers.size >= 2) {
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      view.scale = clamp(pinchStartScale * d / pinchStartDist, 1, MAX_ZOOM);
      const cc = clientToCanvas((a.x + b.x) / 2, (a.y + b.y) / 2);
      view.tx = cc.x - pinchAnchor.x * view.scale;
      view.ty = cc.y - pinchAnchor.y * view.scale;
      clampPan(); moved = true; render();
    } else if (pointers.size === 1) {
      const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
      if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
      const k = canvas.width / canvas.getBoundingClientRect().width;
      view.tx += dx * k; view.ty += dy * k;
      panLast = { x: e.clientX, y: e.clientY };
      clampPan(); render();
    }
  });

  function endPointer(e) {
    if (!pointers.has(e.pointerId)) return;
    const sizeBefore = pointers.size;
    const p = pointers.get(e.pointerId);
    pointers.delete(e.pointerId);
    if (pointers.size === 1) {
      const r = [...pointers.values()][0];
      panLast = { x: r.x, y: r.y }; moved = true;
      return;
    }
    if (sizeBefore === 1 && !moved) handleTap(p.x, p.y);
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);

  // ---- タップ処理 ----
  // ダブルタップ=等倍 / 隠れたブロック上=めくる / マーカー上=新たに隠す
  function handleTap(cx, cy) {
    const now = Date.now();
    if (now - lastTap < 300) { lastTap = 0; resetZoom(); return; }
    lastTap = now;

    const pt = toImg(cx, cy);
    const r = canvas.getBoundingClientRect();
    const tol = 16 * (canvas.width / r.width) / view.scale;

    // すでに隠したブロックに当たれば、めくる／隠すをトグル
    let hit = -1, best = Infinity;
    for (let i = 0; i < boxes.length; i++) {
      const b = boxes[i];
      const dx = Math.max(b.x - pt.x, 0, pt.x - (b.x + b.w));
      const dy = Math.max(b.y - pt.y, 0, pt.y - (b.y + b.h));
      const d = Math.hypot(dx, dy);
      if (d < best) { best = d; hit = i; }
    }
    if (hit >= 0 && best <= tol) {
      boxes[hit].revealed = !boxes[hit].revealed;
      render();
      return;
    }

    // それ以外はマーカーを拾って新しく隠す
    const bb = floodFillAt(pt.x, pt.y);
    if (bb && bb.w > 2 && bb.h > 2) {
      boxes.push({ ...bb, revealed: false });
      render();
    }
  }

  // ---- ボタン ----
  startBtn.addEventListener("click", startCamera);
  shutterBtn.addEventListener("click", capture);
  fileBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    loadFile(f);
    fileInput.value = "";
  });
  resetBtn.addEventListener("click", () => { boxes.forEach(b => b.revealed = false); render(); });
  undoBtn.addEventListener("click", () => { boxes.pop(); render(); });
  clearBtn.addEventListener("click", () => { boxes = []; render(); });
  retakeBtn.addEventListener("click", () => {
    canvas.classList.add("hidden");
    video.classList.remove("hidden");
    resultControls.classList.add("hidden");
    cameraControls.classList.remove("hidden");
    boxes = []; markerMask = null;
    startCamera();
  });

  function setColorMode(m) {
    colorMode = m;
    colRed.classList.toggle("active", m === "red");
    colBlue.classList.toggle("active", m === "blue");
    colBoth.classList.toggle("active", m === "both");
    computeMask();   // 拾える色が変わるのでマスク再計算（既存の隠しブロックは保持）
  }
  colRed.addEventListener("click", () => setColorMode("red"));
  colBlue.addEventListener("click", () => setColorMode("blue"));
  colBoth.addEventListener("click", () => setColorMode("both"));
  sensitivity.addEventListener("input", computeMask);

  sensVal.textContent = sensitivity.value;
})();
</script>
</body>
</html>
