<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>赤シート暗記アプリ</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #1c1c1e;
    color: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 12px 16px;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
    background: #2c2c2e;
    border-bottom: 1px solid #3a3a3c;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    gap: 12px;
  }
  /* カメラ映像・結果キャンバスの共通枠 */
  #stage {
    position: relative;
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: center;
  }
  video, canvas {
    width: 100%;
    max-width: 600px;
    border-radius: 12px;
    background: #000;
    display: block;
  }
  /* カスタムのピンチ/パン処理をするため、ブラウザ既定のジェスチャは無効化 */
  canvas { touch-action: none; }

  .controls {
    width: 100%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .row { display: flex; gap: 10px; }
  button {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: #0a84ff;
    color: #fff;
  }
  button:active { opacity: .75; }
  button.secondary { background: #3a3a3c; }
  button.active { background: #30d158; color: #000; }
  button.shutter {
    background: #fff; color: #000; font-size: 17px;
  }

  .slider-box {
    background: #2c2c2e;
    border-radius: 10px;
    padding: 12px 14px;
  }
  .slider-box label {
    display: flex; justify-content: space-between;
    font-size: 13px; color: #aeaeb2; margin-bottom: 8px;
  }
  input[type=range] { width: 100%; }

  .hidden { display: none !important; }
  #msg {
    font-size: 13px; color: #aeaeb2; text-align: center;
    padding: 0 16px; line-height: 1.6;
  }
  .hint { font-size: 12px; color: #8e8e93; text-align: center; }
</style>
</head>
<body>
<header>赤シート暗記アプリ</header>

<main>
  <div id="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas" class="hidden"></canvas>
  </div>

  <div id="msg" class="hidden"></div>

  <!-- 撮影前のコントロール -->
  <div class="controls" id="cameraControls">
    <button id="startBtn">カメラを起動</button>
    <button id="shutterBtn" class="shutter hidden">● 撮影</button>
    <button id="fileBtn" class="secondary">保存した写真から選ぶ</button>
    <input id="fileInput" type="file" accept="image/*" class="hidden">
    <p class="hint">背面カメラで撮るか、保存済みの写真を選んでください（赤・オレンジ・青のマーカー部分を隠します）</p>
  </div>

  <!-- 撮影後のコントロール -->
  <div class="controls hidden" id="resultControls">
    <div class="slider-box">
      <label><span>検出する色の感度（赤・青マーカー）</span><span id="sensVal"></span></label>
      <input type="range" id="sensitivity" min="8" max="55" value="22">
      <p class="hint">取りこぼす→左へ / 余計な所まで隠れる→右へ</p>
    </div>
    <div class="row">
      <button id="selectBtn" class="secondary">範囲を選択</button>
      <button id="clearRoiBtn" class="secondary">範囲をクリア</button>
    </div>
    <div class="row">
      <button id="resetBtn" class="secondary">全部隠す</button>
      <button id="retakeBtn" class="secondary">撮り直し</button>
    </div>
    <p class="hint" id="resultHint">タップ→開閉 ／ 2本指でズーム ／ ダブルタップで等倍</p>
  </div>
</main>

<script>
(() => {
  "use strict";

  const video   = document.getElementById("video");
  const canvas  = document.getElementById("canvas");
  const ctx     = canvas.getContext("2d");
  const msg     = document.getElementById("msg");

  const cameraControls = document.getElementById("cameraControls");
  const resultControls = document.getElementById("resultControls");
  const startBtn    = document.getElementById("startBtn");
  const shutterBtn  = document.getElementById("shutterBtn");
  const fileBtn     = document.getElementById("fileBtn");
  const fileInput   = document.getElementById("fileInput");
  const resetBtn    = document.getElementById("resetBtn");
  const retakeBtn   = document.getElementById("retakeBtn");
  const selectBtn   = document.getElementById("selectBtn");
  const clearRoiBtn = document.getElementById("clearRoiBtn");
  const sensitivity = document.getElementById("sensitivity");
  const sensVal     = document.getElementById("sensVal");
  const resultHint  = document.getElementById("resultHint");

  let stream = null;
  let baseCanvas = null;      // 撮影画像を保持するオフスクリーンキャンバス
  let baseImageData = null;   // 検出用の画素データ
  let boxes = [];             // 検出したブロック [{x,y,w,h,revealed}]
  let roi = null;             // 検出範囲 {x,y,w,h}（null なら画像全体）
  let mode = "view";          // "view"（閲覧・ズーム） | "select"（範囲選択）
  let dragRect = null;        // 範囲選択中のプレビュー矩形
  const view = { scale: 1, tx: 0, ty: 0 };  // 画像座標→キャンバス座標の変換
  const MAX_DIM = 1100;       // 処理する最大解像度
  const MIN_PIXELS = 12;      // ノイズ除去
  const MAX_ZOOM = 6;

  // ポインタ操作（タップ/パン/ピンチ/範囲選択）の状態
  const pointers = new Map();
  let panLast = null, pinchStartDist = 0, pinchStartScale = 1, pinchAnchor = null;
  let moved = false, selectStart = null, lastTap = 0;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  function showMsg(text){ msg.textContent = text; msg.classList.remove("hidden"); }
  function hideMsg(){ msg.classList.add("hidden"); }

  // ---- カメラ起動 ----
  async function startCamera() {
    hideMsg();
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showMsg("このブラウザではカメラを使えません。\nLINE・Instagram・X などアプリ内のブラウザで開いている場合は、メニューから「Safari / Chrome で開く」を選んで開き直してください。");
      startBtn.classList.remove("hidden");
      return;
    }
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: "environment" } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      startBtn.classList.add("hidden");
      shutterBtn.classList.remove("hidden");
    } catch (e) {
      let m;
      if (e.name === "NotAllowedError" || e.name === "SecurityError") {
        m = "カメラの使用が許可されませんでした。\nアドレスバーのカメラ／鍵アイコン、またはブラウザの設定でこのサイトのカメラを「許可」にしてから、もう一度「カメラを起動」を押してください。";
      } else if (e.name === "NotFoundError" || e.name === "OverconstrainedError") {
        m = "使えるカメラが見つかりませんでした。別のブラウザ（Safari / Chrome）で試してください。（" + e.name + "）";
      } else if (e.name === "NotReadableError") {
        m = "カメラが他のアプリで使用中の可能性があります。他のカメラアプリを閉じて、もう一度お試しください。";
      } else {
        m = "カメラを起動できませんでした（" + e.name + "）。\nSafari / Chrome で、URL https://hidy0877-neo.github.io/aka-sheet/ を直接開いているか確認してください。";
      }
      showMsg(m);
      startBtn.classList.remove("hidden");
    }
  }

  // ---- 画像ソース（カメラ映像 or 読み込んだ画像）を取り込んで結果画面へ ----
  function setupFromSource(src, sw, sh) {
    if (!sw || !sh) { showMsg("画像を読み込めませんでした。別の写真でお試しください。"); return; }

    const s = Math.min(1, MAX_DIM / Math.max(sw, sh));
    const w = Math.round(sw * s), h = Math.round(sh * s);

    baseCanvas = document.createElement("canvas");
    baseCanvas.width = w; baseCanvas.height = h;
    const bctx = baseCanvas.getContext("2d", { willReadFrequently: true });
    bctx.drawImage(src, 0, 0, w, h);
    baseImageData = bctx.getImageData(0, 0, w, h);

    canvas.width = w; canvas.height = h;
    view.scale = 1; view.tx = 0; view.ty = 0;
    roi = null; dragRect = null; setMode("view");

    stopCamera();
    hideMsg();
    video.classList.add("hidden");
    canvas.classList.remove("hidden");
    startBtn.classList.add("hidden");
    shutterBtn.classList.add("hidden");
    cameraControls.classList.add("hidden");
    resultControls.classList.remove("hidden");

    detectAndRender();
  }

  // ---- 撮影：今のカメラ映像を1枚取り込む ----
  function capture() {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) { showMsg("まだ映像が準備できていません。少し待ってからもう一度。"); return; }
    setupFromSource(video, vw, vh);
  }

  // ---- 保存済みの写真ファイルを読み込む（EXIF回転も反映）----
  async function loadFile(file) {
    if (!file) return;
    hideMsg();
    try {
      let src, sw, sh;
      if (window.createImageBitmap) {
        const bmp = await createImageBitmap(file, { imageOrientation: "from-image" });
        src = bmp; sw = bmp.width; sh = bmp.height;
      } else {
        const img = await new Promise((res, rej) => {
          const im = new Image();
          im.onload = () => res(im);
          im.onerror = rej;
          im.src = URL.createObjectURL(file);
        });
        src = img; sw = img.naturalWidth; sh = img.naturalHeight;
      }
      setupFromSource(src, sw, sh);
    } catch (e) {
      showMsg("この画像は読み込めませんでした（" + (e && e.name ? e.name : "エラー") + "）。別の写真でお試しください。");
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  }

  // ---- マーカー画素の判定（HSV方式）----
  // 赤〜オレンジ、または青マーカーの色相帯を拾う。
  // 彩度・明度が低い画素（紙・黒文字・影）と、青緑(シアン=見出し帯)は除外する。
  function isTarget(r, g, b, satMin) {
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    const v = max / 255;
    if (v < 0.18) return false;                   // 暗すぎ（黒・濃い影）は除外
    const delta = max - min;
    if (delta === 0) return false;                // 無彩色は除外
    const sat = delta / max;
    if (sat < satMin) return false;               // 鮮やかさ不足（紙の色など）は除外
    let h;
    if (max === r)      h = 60 * (((g - b) / delta) % 6);
    else if (max === g) h = 60 * ((b - r) / delta + 2);
    else                h = 60 * ((r - g) / delta + 4);
    if (h < 0) h += 360;
    if (h <= 45 || h >= 335) return true;         // 赤〜オレンジ
    if (h >= 200 && h <= 250) return true;        // 青マーカー（シアン180〜200は除外）
    return false;
  }

  // ---- 近い矩形をグループ化（Union-Find）----
  function groupRects(rects, w, h) {
    const n = rects.length;
    if (n === 0) return [];
    const hs = rects.map(r => r.h).sort((a, b) => a - b);
    const medH = hs[Math.floor(n / 2)] || 8;
    const mx = medH * 0.9;                          // 横は単語内の文字間をつなぐ
    const my = medH * 0.45;                         // 縦は別の行をまたがない程度

    const parent = new Int32Array(n);
    for (let i = 0; i < n; i++) parent[i] = i;
    const find = (x) => { while (parent[x] !== x) { parent[x] = parent[parent[x]]; x = parent[x]; } return x; };
    const union = (a, b) => { a = find(a); b = find(b); if (a !== b) parent[a] = b; };

    for (let i = 0; i < n; i++) {
      const a = rects[i];
      const ax1 = a.x - mx, ay1 = a.y - my, ax2 = a.x + a.w + mx, ay2 = a.y + a.h + my;
      for (let j = i + 1; j < n; j++) {
        const b = rects[j];
        if (ax1 < b.x + b.w && ax2 > b.x && ay1 < b.y + b.h && ay2 > b.y) union(i, j);
      }
    }

    const groups = new Map();
    for (let i = 0; i < n; i++) {
      const root = find(i), r = rects[i];
      const g = groups.get(root);
      if (!g) groups.set(root, { x: r.x, y: r.y, x2: r.x + r.w, y2: r.y + r.h });
      else {
        if (r.x < g.x) g.x = r.x;
        if (r.y < g.y) g.y = r.y;
        if (r.x + r.w > g.x2) g.x2 = r.x + r.w;
        if (r.y + r.h > g.y2) g.y2 = r.y + r.h;
      }
    }

    const pad = 3;
    return [...groups.values()].map(g => ({
      x: Math.max(0, g.x - pad),
      y: Math.max(0, g.y - pad),
      w: Math.min(w, g.x2 + pad) - Math.max(0, g.x - pad),
      h: Math.min(h, g.y2 + pad) - Math.max(0, g.y - pad)
    }));
  }

  // ---- 検出 → 矩形抽出 → 描画 ----
  function detectAndRender() {
    if (!baseImageData) return;
    const t = Number(sensitivity.value);
    sensVal.textContent = t;
    const satMin = t / 100;

    const { width: w, height: h, data } = baseImageData;
    const mask = new Uint8Array(w * h);

    // 検出範囲（roi があればその中だけ走査）
    let x0 = 0, y0 = 0, x1 = w, y1 = h;
    if (roi) {
      x0 = clamp(Math.floor(roi.x), 0, w); y0 = clamp(Math.floor(roi.y), 0, h);
      x1 = clamp(Math.ceil(roi.x + roi.w), 0, w); y1 = clamp(Math.ceil(roi.y + roi.h), 0, h);
    }
    for (let y = y0; y < y1; y++) {
      for (let x = x0; x < x1; x++) {
        const p = y * w + x, i = p * 4;
        if (isTarget(data[i], data[i + 1], data[i + 2], satMin)) mask[p] = 1;
      }
    }

    // 連結成分ラベリング → 生の矩形
    const visited = new Uint8Array(w * h);
    const stack = new Int32Array(w * h);
    const maxArea = w * h * 0.03;
    const rects = [];
    for (let p = 0; p < mask.length; p++) {
      if (!mask[p] || visited[p]) continue;
      let sp = 0; stack[sp++] = p; visited[p] = 1;
      let minX = w, minY = h, maxX = 0, maxY = 0, count = 0;
      while (sp > 0) {
        const cur = stack[--sp];
        const cx = cur % w, cy = (cur - cx) / w;
        if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
        if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;
        count++;
        if (cx > 0     && mask[cur - 1] && !visited[cur - 1]) { visited[cur - 1] = 1; stack[sp++] = cur - 1; }
        if (cx < w - 1 && mask[cur + 1] && !visited[cur + 1]) { visited[cur + 1] = 1; stack[sp++] = cur + 1; }
        if (cy > 0     && mask[cur - w] && !visited[cur - w]) { visited[cur - w] = 1; stack[sp++] = cur - w; }
        if (cy < h - 1 && mask[cur + w] && !visited[cur + w]) { visited[cur + w] = 1; stack[sp++] = cur + w; }
      }
      if (count < MIN_PIXELS) continue;
      const bw = maxX - minX + 1, bh = maxY - minY + 1;
      if (bw * bh > maxArea) continue;
      rects.push({ x: minX, y: minY, w: bw, h: bh });
    }

    boxes = groupRects(rects, w, h).map(r => ({ ...r, revealed: false }));
    render();
  }

  // ---- 描画（ズーム/パンを反映）----
  function render() {
    if (!baseCanvas) return;
    const w = canvas.width, h = canvas.height;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, w, h);

    ctx.setTransform(view.scale, 0, 0, view.scale, view.tx, view.ty);
    ctx.drawImage(baseCanvas, 0, 0);

    ctx.fillStyle = "#2b2b2e";
    for (const b of boxes) { if (!b.revealed) ctx.fillRect(b.x, b.y, b.w, b.h); }

    const lw = 2 / view.scale, dash = [8 / view.scale, 6 / view.scale];
    if (roi) {
      ctx.strokeStyle = "#0a84ff"; ctx.lineWidth = lw;
      ctx.setLineDash(dash); ctx.strokeRect(roi.x, roi.y, roi.w, roi.h); ctx.setLineDash([]);
    }
    if (dragRect) {
      ctx.fillStyle = "rgba(48,209,88,0.15)";
      ctx.fillRect(dragRect.x, dragRect.y, dragRect.w, dragRect.h);
      ctx.strokeStyle = "#30d158"; ctx.lineWidth = lw;
      ctx.setLineDash(dash); ctx.strokeRect(dragRect.x, dragRect.y, dragRect.w, dragRect.h); ctx.setLineDash([]);
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }

  // ---- 座標変換ヘルパー ----
  function clientToCanvas(cx, cy) {
    const r = canvas.getBoundingClientRect();
    return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
  }
  function toImg(cx, cy) {
    const c = clientToCanvas(cx, cy);
    return { x: (c.x - view.tx) / view.scale, y: (c.y - view.ty) / view.scale };
  }
  function normRect(a, b) {
    return { x: Math.min(a.x, b.x), y: Math.min(a.y, b.y), w: Math.abs(a.x - b.x), h: Math.abs(a.y - b.y) };
  }
  function clampPan() {
    const w = canvas.width, h = canvas.height;
    view.tx = clamp(view.tx, w - w * view.scale, 0);
    view.ty = clamp(view.ty, h - h * view.scale, 0);
  }
  function resetZoom() { view.scale = 1; view.tx = 0; view.ty = 0; render(); }

  function setMode(m) {
    mode = m;
    if (m === "select") {
      selectBtn.textContent = "範囲選択中…";
      selectBtn.classList.add("active");
      resultHint.textContent = "指でドラッグして、隠したい範囲を囲んでください";
    } else {
      selectBtn.textContent = "範囲を選択";
      selectBtn.classList.remove("active");
      resultHint.textContent = "タップ→開閉 ／ 2本指でズーム ／ ダブルタップで等倍";
    }
  }

  // ---- ポインタ操作 ----
  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    moved = false;
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()];
      pinchStartDist = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      pinchStartScale = view.scale;
      pinchAnchor = toImg((a.x + b.x) / 2, (a.y + b.y) / 2);
      dragRect = null;
    } else if (pointers.size === 1) {
      panLast = { x: e.clientX, y: e.clientY };
      if (mode === "select") { selectStart = toImg(e.clientX, e.clientY); dragRect = null; }
    }
  });

  canvas.addEventListener("pointermove", (e) => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (pointers.size >= 2) {
      // ピンチでズーム（2本指の中点を固定して拡大縮小）
      const [a, b] = [...pointers.values()];
      const d = Math.hypot(a.x - b.x, a.y - b.y) || 1;
      view.scale = clamp(pinchStartScale * d / pinchStartDist, 1, MAX_ZOOM);
      const cc = clientToCanvas((a.x + b.x) / 2, (a.y + b.y) / 2);
      view.tx = cc.x - pinchAnchor.x * view.scale;
      view.ty = cc.y - pinchAnchor.y * view.scale;
      clampPan(); moved = true; render();
    } else if (pointers.size === 1) {
      if (mode === "select") {
        dragRect = normRect(selectStart, toImg(e.clientX, e.clientY));
        moved = true; render();
      } else {
        const dx = e.clientX - panLast.x, dy = e.clientY - panLast.y;
        if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
        const k = canvas.width / canvas.getBoundingClientRect().width;
        view.tx += dx * k; view.ty += dy * k;
        panLast = { x: e.clientX, y: e.clientY };
        clampPan(); render();
      }
    }
  });

  function endPointer(e) {
    if (!pointers.has(e.pointerId)) return;
    const sizeBefore = pointers.size;
    const p = pointers.get(e.pointerId);
    pointers.delete(e.pointerId);

    // ピンチ後に1本残ったら、その指をパンの基準にする（タップ誤発火も防ぐ）
    if (pointers.size === 1) {
      const r = [...pointers.values()][0];
      panLast = { x: r.x, y: r.y }; moved = true;
      return;
    }
    if (mode === "select" && sizeBefore === 1) {
      if (dragRect && dragRect.w > 6 && dragRect.h > 6) {
        roi = { ...dragRect }; dragRect = null; setMode("view"); detectAndRender();
      } else {
        dragRect = null; setMode("view"); render();
      }
      return;
    }
    if (sizeBefore === 1 && !moved) handleTap(p.x, p.y);
  }
  canvas.addEventListener("pointerup", endPointer);
  canvas.addEventListener("pointercancel", endPointer);

  // ---- タップ：ダブルタップで等倍 / 単タップで一番近いブロックを開閉 ----
  function handleTap(cx, cy) {
    const now = Date.now();
    if (now - lastTap < 300) { lastTap = 0; resetZoom(); return; }
    lastTap = now;

    const pt = toImg(cx, cy);
    const r = canvas.getBoundingClientRect();
    const tol = 20 * (canvas.width / r.width) / view.scale;  // 画面上で約20px
    let hit = -1, best = Infinity;
    for (let i = 0; i < boxes.length; i++) {
      const b = boxes[i];
      const dx = Math.max(b.x - pt.x, 0, pt.x - (b.x + b.w));
      const dy = Math.max(b.y - pt.y, 0, pt.y - (b.y + b.h));
      const d = Math.hypot(dx, dy);
      if (d < best) { best = d; hit = i; }
    }
    if (hit >= 0 && best <= tol) { boxes[hit].revealed = !boxes[hit].revealed; render(); }
  }

  // ---- ボタン ----
  startBtn.addEventListener("click", startCamera);
  shutterBtn.addEventListener("click", capture);
  fileBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    loadFile(f);
    fileInput.value = "";   // 同じ写真を再度選べるようにリセット
  });
  resetBtn.addEventListener("click", () => { boxes.forEach(b => b.revealed = false); render(); });
  retakeBtn.addEventListener("click", () => {
    canvas.classList.add("hidden");
    video.classList.remove("hidden");
    resultControls.classList.add("hidden");
    cameraControls.classList.remove("hidden");
    roi = null; dragRect = null; setMode("view");
    startCamera();
  });
  selectBtn.addEventListener("click", () => { setMode(mode === "select" ? "view" : "select"); render(); });
  clearRoiBtn.addEventListener("click", () => { roi = null; detectAndRender(); });
  sensitivity.addEventListener("input", detectAndRender);

  sensVal.textContent = sensitivity.value;
})();
</script>
</body>
</html>
